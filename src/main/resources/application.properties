spring.application.name=api

# Configuration de la base de données H2 (en mémoire)
spring.datasource.url=jdbc:h2:mem:bibliothequedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Activer la console H2 (interface web pour voir la base)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Demander à JPA de créer les tables automatiquement
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always